<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Civilization I — reboot2</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <div id="topbar">
      <span id="turn-info">Turn 0</span>
      <span id="year-info">4000 BC</span>
      <span id="player-info"></span>
    </div>

    <div id="main">
      <canvas id="map-canvas"></canvas>
      <div id="sidebar">
        <div id="unit-panel">
          <h3>Active Unit</h3>
          <div id="unit-info">—</div>
          <button id="btn-endturn">End Turn (Space)</button>
          <button id="btn-autoplay">▶ Auto-play</button>
          <button id="btn-newgame">New Game</button>
        </div>
        <div id="civs-panel">
          <h3>Civilizations</h3>
          <label class="modal-checkbox view-all-checkbox"><input type="checkbox" id="view-all-checkbox"> Toute la carte</label>
          <div id="civs-list"></div>
        </div>
        <div id="status-panel">
          <div id="status-msg">Connecting...</div>
        </div>
      </div>
    </div>
  </div>

  <div id="newgame-modal" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <h3>New Game</h3>
      <label for="ng-difficulty">Difficulty</label>
      <select id="ng-difficulty">
        <option value="0">Chieftain</option>
        <option value="1">Warlord</option>
        <option value="2" selected>Prince</option>
        <option value="3">King</option>
        <option value="4">Emperor</option>
      </select>

      <label for="ng-map">Map</label>
      <select id="ng-map">
        <option value="random" selected>Random</option>
        <option value="earth">Earth</option>
      </select>

      <label for="ng-landmass">Land Mass</label>
      <select id="ng-landmass">
        <option value="-1">Tiny</option>
        <option value="0">Small</option>
        <option value="1">Normal</option>
        <option value="2" selected>Large</option>
        <option value="3">Huge</option>
      </select>

      <label for="ng-age">Age</label>
      <select id="ng-age">
        <option value="0">3 billion years</option>
        <option value="1" selected>4 billion years</option>
        <option value="2">5 billion years</option>
      </select>

      <label class="modal-checkbox"><input type="checkbox" id="ng-barbarians"> Barbarians</label>

      <div class="modal-actions">
        <button id="ng-cancel">Cancel</button>
        <button id="ng-start">Start</button>
      </div>
    </div>
  </div>

  <script src="js/renderer.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
